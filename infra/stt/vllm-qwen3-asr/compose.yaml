services:
  vllm-qwen3-asr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VLLM_IMAGE_TAG: ${VLLM_IMAGE_TAG:-latest}
        VLLM_AUDIO_PIP_SPEC: ${VLLM_AUDIO_PIP_SPEC:-vllm[audio]}
        HF_TRANSFORMERS_SPEC: ${HF_TRANSFORMERS_SPEC:-}
    container_name: vllm-qwen3-asr
    restart: unless-stopped
    gpus: all
    ipc: host
    ports:
      - "${VLLM_PORT:-8090}:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: ${HF_HUB_ENABLE_HF_TRANSFER:-1}
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-ASR-1.7B}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --dtype
      - ${VLLM_DTYPE:-auto}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - --tensor-parallel-size
      - ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-4096}
      - --api-key
      - ${VLLM_API_KEY:-EMPTY}
      - --trust-remote-code
    volumes:
      - vllm-qwen3-asr-hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  vllm-qwen3-asr-hf-cache:
