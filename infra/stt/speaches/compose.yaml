services:
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: speaches
    restart: unless-stopped
    ports:
      - "${SPEACHES_PORT:-8089}:8000"
    environment:
      LOG_LEVEL: ${SPEACHES_LOG_LEVEL:-info}
      ENABLE_UI: ${SPEACHES_ENABLE_UI:-false}
      STT_MODEL_TTL: ${SPEACHES_STT_MODEL_TTL:--1}
      PRELOAD_MODELS: ${SPEACHES_PRELOAD_MODELS:-["Systran/faster-whisper-small"]}
    volumes:
      - speaches-hf-cache:/home/ubuntu/.cache/huggingface/hub
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  speaches-hf-cache:
