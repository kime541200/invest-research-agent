description = "新增 YouTube 頻道到 resources.yaml，分析近期影片並初始化 channel_state"

prompt = """
# 任務：新增 YouTube 頻道到 resources.yaml

使用者提供了一段新的頻道資訊：
`<channel_info>`
{{args}}
`</channel_info>`

請完成以下工作，將這個頻道安全地加入本專案的 `resources.yaml`。

## 目標

你需要：
1. 解析並確認目標 YouTube 頻道。
2. 透過 `yt-mcp-server` 檢查近期影片與頻道資訊。
3. 為這個 repo 推導一組實用的初始 metadata。
4. 安全更新 `resources.yaml`。
5. 向使用者回報新增結果與可再調整項目。

## 必要流程

### 1. 確認目標頻道

將使用者輸入視為 `<channel_info>`。

如果資訊太少或有歧義，先要求使用者補充以下其中一種：
- channel URL
- `@handle`
- channel name

在目標頻道未明確前，不要修改 `resources.yaml`。

### 2. 透過 MCP 解析頻道身份

使用 `yt-mcp-server` 工具完成：
- 從提供的 handle / URL / name 搜尋頻道
- 確認解析出的 channel id
- 抓取約 5 支近期影片
- 以頻道 metadata 與近期影片標題作為分類依據

### 3. 為本 repo 推導初始設定

在 `yt_channels` 下準備以下結構：

```yaml
<channel_key>:
  url: <channel url>
  alias: []
  tags: ["tag1", "tag2"]
  topic_keywords: ["keyword1", "keyword2"]
  description: <short summary>
  watch_tier: normal
  priority: 0
```

同時在 `channel_state` 下準備：

```yaml
<channel_key>:
  last_checked_video_title: ""
  channel_id: <resolved channel id>
```

### 4. 推導規則

- `channel_key`
  - 優先使用 YouTube handle（去掉 `@`）
  - 否則使用由頻道名稱推得的穩定 ASCII 短識別字串
  - 盡量小寫，不要空白

- `tags`
  - 選 3 到 5 個適合本 repo topic routing 的廣義標籤
  - 優先使用可重用的領域標籤，不要過度細碎

- `topic_keywords`
  - 選 3 到 8 個更具體、可提升 routing 命中的關鍵字或短語
  - 必須能被近期影片主題支撐

- `description`
  - 用 1 句短句總結這個頻道主要在講什麼

- `watch_tier`
  - 預設為 `normal`，除非使用者明確要求更高或更低

- `priority`
  - 預設為 `0`，除非使用者明確指定

- `alias`
  - 只有在替代名稱確實有助於匹配時才加入

請保守推導，目標是得到可靠初稿，而不是一次做到完美 taxonomy。

### 5. 更新 `resources.yaml`

先讀取既有 `resources.yaml`，再更新：
- `yt_channels.<channel_key>`
- `channel_state.<channel_key>`

規則：
- 保留既有 YAML 結構與縮排
- 不要修改無關頻道
- 如果頻道已存在，不要直接覆寫；先回報既有項目並詢問是否更新
- 如果鄰近項目顯示 repo 已採用更完整 schema，請比照目前 schema

### 6. 回報結果

完成後請簡潔回報：
- 頻道名稱
- 解析後的 URL
- 使用的 `channel_key`
- 推導出的 `tags`
- 推導出的 `topic_keywords`
- 選定的 `watch_tier`
- 是否初始化了 `channel_state.channel_id`

最後提醒使用者可以再要求你調整：
- tags
- topic_keywords
- watch_tier
- priority
- alias

## Guardrails

- 必須以 `yt-mcp-server` 作為頻道/影片檢查來源
- 沒查到 MCP 結果前，不要臆測頻道 metadata
- 不要新增本專案 schema 未使用的欄位，除非 `resources.yaml` 明顯已升級
- 這個任務不要碰 note / transcript / analysis artifacts
- 除非使用者明確要求，不要一次批量新增多個頻道
"""
